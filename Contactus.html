<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Contact Us</h1>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#about">About LTS</a></li>
            <li><a href="index.html#menu">Our Menu</a></li>
            <li><a href="Hours.html">Store Hours</a></li>
        </ul>
    </nav>

    <img src="tacos_close_up_400x260.png" alt="">
    <p>Little Taco Shop Tacos</p>

    <main>
        <h2>Our Contact Forum</h2>

        <form action="" method="post">
            <fieldset>
                <legend>Send Us A Message</legend>
                <div>
                    <label for="name">Name:</label>
                    <input type="text" name="Name" id="Name" placeholder="Your Name">
                </div>
                <br>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email" placeholder="Your Email">
                </div>
                <br>
                <div>
                    <label for="Messege">Your Message:</label>
                    <br>
                    <textarea name="Message" id="Message" rows="15" cols="35" placeholder="Type Your Messege Here"></textarea>
                </div>
            </fieldset>

            <button type="submit">send</button>
            <button type="reset">reset</button>
        </form>

        <h2>Our Location</h2>

        <address>
            555 Taco Temptation Lane, Suite T<br>
            Kansas City, MO 55555-5555<br><br>
            Phone: <a href="tel:5555555555">555-555-5555</a>
        </address>


        <p><a href="Contactus.html">Back To Top</a></p>
        <hr>
    </main>

    
    <footer>
         Copyright &copy; The Little Taco Shop
    </footer>
</body>
</html>
